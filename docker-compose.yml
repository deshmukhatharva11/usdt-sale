services:
  # NGINX Reverse Proxy (entry point)
  # Cloudflare Tunnel routes usdtsell.online → us-nginx:80 internally
  # Host port 8082 for local testing only
  nginx:
    image: nginx:alpine
    container_name: us-nginx
    restart: always
    ports:
      - "127.0.0.1:8082:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    networks:
      - us-network

  # Redis Cache (internal only — no public port)
  redis:
    image: redis:7-alpine
    container_name: us-redis
    restart: always
    ports:
      - "127.0.0.1:6381:6379" # localhost only — avoids conflict with existing Redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:-changeme_redis}
    volumes:
      - redis_data:/data
    networks:
      - us-network
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme_redis}", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  # Backend API
  backend:
    build: .
    container_name: us-backend
    restart: always
    # Expose as 3002 on host to avoid conflict with existing backend on 3001
    ports:
      - "127.0.0.1:3002:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - DB_HOST=pgbouncer
      - DB_NAME=${DB_NAME:-usdt_sale}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASS=${DB_PASS}
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-changeme_redis}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-2h}
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - BSC_RPC_URL=${BSC_RPC_URL:-https://bsc-dataseed1.binance.org/}
      - BSC_RPC_URLS=${BSC_RPC_URLS}
      - BSC_TESTNET_RPC_URL=${BSC_TESTNET_RPC_URL}
      - BSC_CHAIN_ID=${BSC_CHAIN_ID:-56}
      - USDT_TOKEN_ADDRESS=${USDT_TOKEN_ADDRESS:-0x55d398326f99059fF775485246999027B3197955}
      - BALANCE_FETCHER_ADDRESS=${BALANCE_FETCHER_ADDRESS}
      - MINE_CONTRACT_ADDRESS=${MINE_CONTRACT_ADDRESS}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - us-network

  # PgBouncer Connection Pooler (reverted to edoburu with fix)
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: us-pgbouncer
    restart: always
    ports:
      - "127.0.0.1:6434:5432" # localhost only — avoids conflict with existing PgBouncer
    environment:
      - DATABASE_URL=postgres://${DB_USER:-postgres}:${DB_PASS}@postgres:5432/${DB_NAME:-usdt_sale}
      - POOL_MODE=session
      - MAX_CLIENT_CONN=200
      - DEFAULT_POOL_SIZE=25
      - AUTH_TYPE=scram-sha-256
      - AUTH_USER=${DB_USER:-postgres}
      - AUTH_QUERY=SELECT usename, passwd FROM pg_shadow WHERE usename=$1
      - IGNORE_STARTUP_PARAMETERS=extra_float_digits,options,application_name
      - VERBOSE=1
      - REVERSE_DNS=0
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASS}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - us-network

  # PostgreSQL Database (internal only — no public port)
  postgres:
    image: postgres:15-alpine
    container_name: us-postgres
    restart: always
    ports:
      - "127.0.0.1:5434:5432" # localhost only — avoids conflict with existing Postgres
    environment:
      - POSTGRES_DB=${DB_NAME:-usdt_sale}
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASS}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - us-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # PGAdmin (Database Management UI) — localhost only, dev/admin access
  # Moved to 5052 to avoid conflict with existing PgAdmin instances
  pgadmin:
    image: dpage/pgadmin4
    container_name: us-pgadmin
    restart: always
    ports:
      - "127.0.0.1:5052:80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_EMAIL:-admin@usdtsale.me}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_PASSWORD:-changeme_pgadmin}
    networks:
      - us-network
    depends_on:
      - postgres
  # Cloudflare Tunnel — connects usdtsell.online to us-nginx
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: us-cloudflared
    restart: always
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - nginx
    networks:
      - us-network

networks:
  us-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
